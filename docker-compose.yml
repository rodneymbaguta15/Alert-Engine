services:
  postgres:
    image: postgres:16-alpine
    container_name: alert-notification-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-alert_notification}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-alert_notification}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - alert-engine-net


volumes:
  postgres_data:
  pgadmin_data:

networks:
  alert-engine-net:
    driver: bridge