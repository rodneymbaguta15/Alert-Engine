spring.application.name=alert-engine


#Database configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# API Keys
finnhub.api-key=${FINNHUB_API_KEY}

# Flyway configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true


# Development logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.alter_engine=DEBUG

# Enable detailed error messages for debugging
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on-param

# Finnhub client timeouts (override defaults if you need to)
finnhub.connect-timeout=5s
finnhub.read-timeout=10s

# App-level polling config
app.polling-interval=60s
app.allowed-tickers=AAPL,NVDA,GOOGL

# Mail (Mailtrap in dev)
mail.host=${MAIL_HOST}
mail.port=587
mail.username=${MAIL_USERNAME}
mail.password=${MAIL_PASSWORD}
mail.from=${MAIL_FROM}
mail.enabled=${MAIL_ENABLED:true}


# JWT
jwt.secret=${JWT_SECRET:dev-only-do-not-use-in-prod-pls-make-it-32+-chars-long}
jwt.expiration=24h
jwt.issuer=alert-engine